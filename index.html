function toggleGrid(){var w=document.getElementById('pgw');var o=w.style.display==='block';w.style.display=o?'none':'block';if(!o){initPg();drawPg()}}
function initPg(){pgData=Array(384).fill(null);if(custPixels)custPixels.forEach(function(p){var i=p.y*16+p.x;if(i>=0&&i<384)pgData[i]=p.c});var cv=document.getElementById('pgc');cv.onmousedown=function(e){pgDown=true;pgPaint(e)};cv.onmousemove=function(e){if(pgDown)pgPaint(e)};cv.onmouseup=function(){pgDown=false};cv.onmouseleave=function(){pgDown=false};cv.ontouchstart=function(e){e.preventDefault();pgDown=true;pgPaint(e.touches[0])};cv.ontouchmove=function(e){e.preventDefault();if(pgDown)pgPaint(e.touches[0])};cv.ontouchend=function(){pgDown=false}}
function pgPaint(e){var cv=document.getElementById('pgc');var r=cv.getBoundingClientRect();var ps=cv.width/16;var gx=Math.floor((e.clientX-r.left)/ps),gy=Math.floor((e.clientY-r.top)/ps);if(gx<0||gx>=16||gy<0||gy>=24)return;var i=gy*16+gx;if(pgTool==='draw')pgData[i]=pgColor;else if(pgTool==='erase')pgData[i]=null;else if(pgTool==='fill')ff(gx,gy,pgData[i],pgColor);drawPg()}
function ff(x,y,t,f){if(t===f||x<0||x>=16||y<0||y>=24)return;var i=y*16+x;if(pgData[i]!==t)return;pgData[i]=f;ff(x+1,y,t,f);ff(x-1,y,t,f);ff(x,y+1,t,f);ff(x,y-1,t,f)}
function drawPg(){var cv=document.getElementById('pgc');if(!cv)return;var ctx=cv.getContext('2d');var ps=cv.width/16;ctx.clearRect(0,0,cv.width,cv.height);var x,y;for(y=0;y<24;y++)for(x=0;x<16;x++){ctx.fillStyle=(x+y)%2===0?'#1e1408':'#1a1008';ctx.fillRect(x*ps,y*ps,ps,ps)}pgData.forEach(function(c,i){if(!c)return;ctx.fillStyle=c;ctx.fillRect((i%16)*ps,Math.floor(i/16)*ps,ps,ps)});ctx.strokeStyle='rgba(255,204,68,0.15)';ctx.lineWidth=0.5;for(x=0;x<=16;x++){ctx.beginPath();ctx.moveTo(x*ps,0);ctx.lineTo(x*ps,24*ps);ctx.stroke()}for(y=0;y<=24;y++){ctx.beginPath();ctx.moveTo(0,y*ps);ctx.lineTo(16*ps,y*ps);ctx.stroke()}}
function setPgT(t,el){pgTool=t;document.querySelectorAll('.pgt .tb').forEach(function(b){b.classList.remove('ac')});el.classList.add('ac')}
function clrGrid(){pgData=Array(384).fill(null);drawPg()}
function applyCust(){custPixels=[];pgData.forEach(function(c,i){if(c)custPixels.push({x:i%16,y:Math.floor(i/16),c:c})});updPv()}
function clearCust(){custPixels=null;updPv()}

// ═══ LINEAGE TAB ═══
var lineageSelectedIdx=-1;

function getGenDepth(a,depth){
  if(!a||!a._parents)return depth;
  var p1=null,p2=null;
  agents.forEach(function(x){
    if(x.name===(a._parents[0]||'')&&!p1)p1=x;
    if(x.name===(a._parents[1]||'')&&!p2)p2=x;
  });
  return Math.max(getGenDepth(p1,depth+1),getGenDepth(p2,depth+1));
}

function selectLineageAgent(idx){
  lineageSelectedIdx=idx;
  renderLineage(document.getElementById('cb'));
}

function renderLineage(c){
  var h='';
  if(!agents.length){
    c.innerHTML='<div style="color:var(--text3);font-size:9px;padding:40px;text-align:center">No agents yet. Go to CREATE tab.</div>';
    return;
  }

  // Scrollable agent selector row
  h+='<div style="font-size:9px;color:var(--gold2);margin-bottom:8px">SELECT AGENT</div>';
  h+='<div style="display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;margin-bottom:16px;border-bottom:1px solid var(--border)">';
  agents.forEach(function(a,i){
    var isSelected=(i===lineageSelectedIdx);
    var gen=a._parents?getGenDepth(a,0):0;
    var border=isSelected?'2px solid var(--gold)':'1px solid var(--border)';
    var bg=isSelected?'var(--bg)':'var(--bg3)';
    h+='<div onclick="selectLineageAgent('+i+')" style="cursor:pointer;background:'+bg+';border:'+border+';border-radius:4px;padding:6px 8px;text-align:center;min-width:70px;flex-shrink:0">';
    h+='<div>'+renderChar(a,2)+'</div>';
    h+='<div style="font-size:7px;color:'+(isSelected?'var(--gold)':'var(--text)')+';margin-top:2px;word-break:break-word">'+esc(a.name)+'</div>';
    h+='<div style="font-size:6px;color:var(--text2)">Gen '+gen+'</div>';
    h+='</div>';
  });
  h+='</div>';

  if(lineageSelectedIdx<0||!agents[lineageSelectedIdx]){
    h+='<div style="color:var(--text3);font-size:9px;padding:20px;text-align:center">Click an agent above to view their dynasty tree.</div>';
    c.innerHTML=h;
    return;
  }

  var a=agents[lineageSelectedIdx];

  function findAgent(name){
    var found=null;
    agents.forEach(function(x){if(x.name===name&&!found)found=x;});
    return found;
  }

  function treeCard(ag,name,isMain){
    var lv=ag?getLevelFromXP(ag.xp||0):1;
    var pers=ag?(ag.personality||'?'):'?';
    var border=isMain?'2px solid var(--gold)':'1px solid var(--border)';
    var bg=isMain?'var(--bg)':'var(--bg2)';
    var nameColor=isMain?'var(--gold)':'var(--text)';
    var h='<div style="text-align:center;background:'+bg+';border:'+border+';border-radius:4px;padding:6px 8px;min-width:70px;max-width:90px">';
    if(ag){h+='<div>'+renderChar(ag,2)+'</div>';}
    else{h+='<div style="height:48px;line-height:48px;color:var(--text3);font-size:10px">\u2753</div>';}
    h+='<div style="font-size:7px;color:'+nameColor+';margin-top:2px;word-break:break-word;line-height:1.4">'+esc(name||'?')+'</div>';
    h+='<div style="font-size:6px;color:var(--text2)">Lv.'+lv+' \u00b7 '+esc(pers)+'</div>';
    h+='</div>';
    return h;
  }

  var row='<div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap">';
  var connector='<div style="text-align:center;font-size:10px;color:var(--border);margin:6px 0">\u2193</div>';

  h+='<div style="font-size:9px;color:var(--gold2);margin-bottom:12px">DYNASTY TREE: '+esc(a.name)+'</div>';

  // Grandparents
  var p1name=(a._parents||[])[0]||null;
  var p2name=(a._parents||[])[1]||null;
  var p1=p1name?findAgent(p1name):null;
  var p2=p2name?findAgent(p2name):null;
  var gp1L=p1&&p1._parents?(p1._parents[0]||null):null;
  var gp1R=p1&&p1._parents?(p1._parents[1]||null):null;
  var gp2L=p2&&p2._parents?(p2._parents[0]||null):null;
  var gp2R=p2&&p2._parents?(p2._parents[1]||null):null;
  var hasGP=gp1L||gp1R||gp2L||gp2R;
  if(hasGP){
    h+=row;
    if(gp1L)h+=treeCard(findAgent(gp1L),gp1L,false);
    if(gp1R)h+=treeCard(findAgent(gp1R),gp1R,false);
    if(gp2L)h+=treeCard(findAgent(gp2L),gp2L,false);
    if(gp2R)h+=treeCard(findAgent(gp2R),gp2R,false);
    h+='</div>'+connector;
  }

  // Parents
  if(p1name||p2name){
    h+=row;
    if(p1name)h+=treeCard(p1,p1name,false);
    if(p2name)h+=treeCard(p2,p2name,false);
    h+='</div>'+connector;
  }

  // Selected agent
  h+=row+treeCard(a,a.name,true)+'</div>';

  // Children (agents whose _parents include this agent's name)
  var children=[];
  agents.forEach(function(x){
    if(x._parents&&(x._parents[0]===a.name||x._parents[1]===a.name))children.push(x);
  });
  if(children.length){
    h+=connector+row;
    children.forEach(function(ch){h+=treeCard(ch,ch.name,false);});
    h+='</div>';
    h+='<div style="font-size:7px;color:var(--text2);text-align:center;margin-top:4px">'+children.length+' child'+(children.length>1?'ren':'')+'</div>';
  }

  c.innerHTML=h;
}
