<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>8-Gents — Your Agents. Alive.</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#1a1008;--bg2:#120c04;--bg3:#1e1408;--border:#3d2c0a;--gold:#ffcc44;--gold2:#a07820;--gold3:#6b5010;--text:#f0e6cc;--text2:#a07820;--text3:#9b8850;--cyan:#00ffcc;--cyan2:#003322;--red:#e74c3c;--green:#2ecc71;--purple:#9b59b6;--orange:#e67e22;--blue:#4A90D9}
body{background:var(--bg);color:var(--text);font-family:'Press Start 2P',monospace;overflow:hidden;height:100vh;display:flex;flex-direction:column;user-select:none}
#topbar{height:48px;background:var(--bg2);border-bottom:3px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:16px;flex-shrink:0;z-index:10}
.logo{font-size:17px;color:var(--gold);letter-spacing:3px;text-shadow:2px 2px #000}
.tagline{font-size:9px;color:var(--gold2);letter-spacing:1px;margin-top:2px}
.badge{font-size:8px;color:#000;background:var(--gold);padding:3px 8px;border-radius:2px;margin-left:auto}
#main{display:flex;flex:1;overflow:hidden}
#menu{width:190px;background:var(--bg2);border-right:3px solid var(--border);flex-shrink:0;display:flex;flex-direction:column}
#mi{border:2px solid var(--border);margin:8px;border-radius:4px;flex:1;display:flex;flex-direction:column}
#mt{text-align:center;font-size:10px;color:var(--gold);padding:10px 0 8px;border-bottom:1px solid var(--border)}
.mi{padding:10px 14px;font-size:9px;color:var(--text2);cursor:pointer;border-bottom:1px solid rgba(61,44,10,0.2);transition:all .15s;display:flex;align-items:center;gap:8px}
.mi:hover{color:var(--gold);background:rgba(255,204,68,0.05)}
.mi.ac{color:var(--gold);background:rgba(255,204,68,0.1);text-shadow:0 0 6px rgba(255,204,68,0.3)}
.mi .ar{opacity:0;transition:opacity .15s}.mi.ac .ar{opacity:1}
#mf{padding:8px;border-top:1px solid var(--border);text-align:center;font-size:7px;color:var(--text3);margin-top:auto}
#content{flex:1;display:flex;flex-direction:column;overflow:hidden}
#ci{border:2px solid var(--border);margin:8px 8px 8px 0;border-radius:4px;flex:1;display:flex;flex-direction:column;overflow:hidden}
#ch{padding:10px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
#ch .t{font-size:11px;color:var(--gold)}
#ch .s{font-size:8px;color:var(--text2)}
#cb{flex:1;overflow-y:auto;padding:12px}
#cb::-webkit-scrollbar{width:6px}
#cb::-webkit-scrollbar-track{background:var(--bg)}
#cb::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* AGENT CARDS (collapsed) */
.ag-grid{display:flex;flex-wrap:wrap;gap:10px}
.ag-card{background:var(--bg2);border:2px solid var(--border);border-radius:4px;width:160px;cursor:pointer;transition:border-color .2s;overflow:hidden}
.ag-card:hover{border-color:var(--gold2)}
.ag-sprite{height:130px;background:var(--bg);display:flex;align-items:center;justify-content:center;border-bottom:1px solid var(--border)}
.ag-info{padding:7px}
.ag-name{font-size:9px;color:var(--gold);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ag-role{font-size:7px;color:var(--text2);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ag-plat{font-size:7px;color:var(--cyan);background:var(--cyan2);padding:2px 5px;border-radius:2px;display:inline-block}
.new-card{background:var(--bg2);border:2px dashed var(--border);border-radius:4px;width:160px;height:200px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;transition:border-color .2s}
.new-card:hover{border-color:var(--gold)}
.new-card .plus{font-size:24px;color:var(--text3)}.new-card:hover .plus{color:var(--gold)}
.new-card .lb{font-size:8px;color:var(--text3)}

/* AGENT TOOLBAR */
.ag-toolbar{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.ag-toolbar input{background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:'Press Start 2P',monospace;font-size:8px;padding:5px 8px;outline:none;width:140px}
.ag-toolbar input:focus{border-color:var(--gold)}
.ag-toolbar input::placeholder{color:var(--text3)}
.ag-toolbar select{background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:'Press Start 2P',monospace;font-size:8px;padding:5px;outline:none;cursor:pointer}
.ag-tbtn{padding:4px 8px;font-size:8px;font-family:'Press Start 2P',monospace;cursor:pointer;border-radius:2px;border:1px solid var(--border);background:var(--bg);color:var(--text2);transition:all .15s;white-space:nowrap}
.ag-tbtn:hover{border-color:var(--gold2);color:var(--text)}
.ag-tbtn.imp{color:var(--cyan);border-color:rgba(0,255,204,0.3)}
.ag-tbtn.imp:hover{background:var(--cyan2);border-color:var(--cyan)}
.ag-tbtn.exp{color:var(--orange);border-color:rgba(230,126,34,0.3)}
.ag-tbtn.exp:hover{background:rgba(230,126,34,0.1);border-color:var(--orange)}
.ag-pin{position:absolute;top:4px;right:4px;font-size:10px;color:var(--text3);cursor:pointer;z-index:2;background:none;border:none;font-family:'Press Start 2P',monospace;padding:2px}
.ag-pin:hover{color:var(--gold)}
.ag-pin.pinned{color:var(--gold);text-shadow:0 0 4px rgba(255,204,68,0.4)}
.ag-card{position:relative}
#import-file{display:none}

/* SKILLS TAB */
.sk-tabs{display:flex;gap:4px;margin-bottom:12px;border-bottom:1px solid var(--border);padding-bottom:8px}
.sk-tab{padding:5px 10px;font-size:8px;font-family:'Press Start 2P',monospace;cursor:pointer;border:1px solid var(--border);background:var(--bg);color:var(--text2);border-radius:2px}
.sk-tab:hover{border-color:var(--gold2);color:var(--text)}
.sk-tab.ac{border-color:var(--gold);color:var(--gold);background:rgba(255,204,68,0.08)}
.sk-card{background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:10px;width:190px;transition:border-color .2s}
.sk-card:hover{border-color:var(--gold2)}
.sk-card .sk-name{font-size:9px;color:var(--cyan);margin-bottom:4px}
.sk-card .sk-cat{font-size:7px;color:var(--text3);margin-bottom:4px;text-transform:uppercase;letter-spacing:1px}
.sk-card .sk-desc{font-size:7px;color:var(--text2);line-height:1.6;margin-bottom:6px}
.sk-card .sk-tier{font-size:7px;padding:2px 5px;border-radius:2px;display:inline-block}
.sk-tier-basic{background:#2a1e10;color:#a07820}
.sk-tier-advanced{background:var(--cyan2);color:var(--cyan)}
.sk-tier-expert{background:rgba(155,89,182,0.15);color:var(--purple)}
.sk-cost{font-size:7px;color:var(--gold);margin-left:6px}
.sk-learn{padding:3px 8px;font-size:7px;font-family:'Press Start 2P',monospace;background:var(--gold);color:#000;border:none;cursor:pointer;border-radius:2px;margin-top:6px}
.sk-learn:hover{background:#ffe066}
.sk-learn:disabled{opacity:0.3;cursor:not-allowed}
.sk-owned{font-size:7px;color:var(--green);margin-top:6px}
.sk-tree-line{display:flex;align-items:center;gap:6px;margin-bottom:8px}
.sk-tree-node{padding:4px 8px;font-size:8px;font-family:'Press Start 2P',monospace;border:1px solid var(--border);border-radius:3px;background:var(--bg)}
.sk-tree-node.unlocked{border-color:var(--cyan);color:var(--cyan)}
.sk-tree-node.locked{color:var(--text3);border-color:var(--text3)}
.sk-tree-arrow{color:var(--text3);font-size:10px}
.sk-create-form{background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:12px;max-width:400px}
.sk-card{cursor:pointer}
.sk-card .sk-desc{max-height:0;overflow:hidden;transition:max-height .2s}
.sk-card.expanded .sk-desc{max-height:60px}
.sk-pool{background:var(--bg);border:2px solid var(--gold);border-radius:4px;padding:8px 14px;display:inline-flex;align-items:center;gap:8px;margin-bottom:12px}
.sk-pool .pool-lbl{font-size:8px;color:var(--gold2)}
.sk-pool .pool-val{font-size:12px;color:var(--gold)}

/* MODAL OVERLAY */
#modal-bg{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:200;align-items:center;justify-content:center}
#modal-bg.open{display:flex}
#modal{background:var(--bg2);border:3px solid var(--gold);border-radius:6px;width:420px;max-height:88vh;display:flex;flex-direction:column;overflow:hidden}
#m-head{padding:12px 16px;border-bottom:2px solid var(--border);display:flex;align-items:center;justify-content:space-between}
#m-head .t{font-size:12px;color:var(--gold)}
.m-close{background:none;border:1px solid var(--red);color:var(--red);font-family:'Press Start 2P',monospace;font-size:9px;padding:3px 7px;cursor:pointer}
.m-close:hover{background:var(--red);color:#000}
#m-body{flex:1;overflow-y:auto;padding:14px}
#m-body::-webkit-scrollbar{width:5px}
#m-body::-webkit-scrollbar-track{background:var(--bg2)}
#m-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
#m-sprite{height:150px;background:var(--bg);border:2px solid var(--border);border-radius:4px;display:flex;align-items:center;justify-content:center;margin-bottom:12px}
.m-row{display:flex;align-items:flex-start;margin-bottom:8px;gap:6px}
.m-lbl{font-size:9px;color:var(--gold2);min-width:75px;padding-top:4px;flex-shrink:0;letter-spacing:0.5px}
.m-val{font-size:10px;color:var(--text);flex:1;line-height:1.6}
.m-val input,.m-val textarea,.m-val select{background:transparent;border:none;border-bottom:1px solid var(--border);color:var(--text);font-family:'Press Start 2P',monospace;font-size:10px;width:100%;padding:3px 0;outline:none;resize:none}
.m-val input:focus,.m-val select:focus{border-bottom-color:var(--gold)}
.m-val select{cursor:pointer;background:var(--bg2)}
.m-skills{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px}
.sk-tag{font-size:9px;color:var(--cyan);background:var(--cyan2);padding:3px 6px;border-radius:2px}
.m-sk-section{background:var(--bg);border:2px solid var(--border);border-radius:4px;padding:10px;margin-bottom:10px}
.m-sk-title{font-size:9px;color:var(--gold);margin-bottom:8px;letter-spacing:1px}
.m-st{font-size:7px;padding:2px 5px;border-radius:2px}
.st-idle{background:#2a1e10;color:#a07820}.st-working{background:#003322;color:#00ffcc}.st-collab{background:#1a0a3a;color:#9b59b6}.st-stuck{background:#3a0a0a;color:#e74c3c}.st-waiting{background:#1a1a0a;color:#f39c12}.st-done{background:#0a2a0a;color:#2ecc71}
.xp-wrap{margin:8px 0}
.xp-label{font-size:9px;color:var(--text2);margin-bottom:3px;display:flex;justify-content:space-between}
.xp-bar{height:4px;background:var(--bg);border-radius:2px;overflow:hidden}
.xp-fill{height:100%;border-radius:2px;transition:width .3s}
#m-foot{padding:10px 14px;border-top:2px solid var(--border);display:flex;gap:6px}
.m-btn{padding:7px 14px;font-size:10px;font-family:'Press Start 2P',monospace;cursor:pointer;border-radius:2px}
.m-edit{background:var(--gold);color:#000;border:none;flex:1}
.m-edit:hover{background:#ffe066}
.m-del{background:transparent;color:var(--red);border:1px solid var(--red)}
.m-del:hover{background:var(--red);color:#000}

/* CREATE TAB */
#create-wrap{display:flex;gap:16px;flex-wrap:wrap}
#create-left{width:280px;flex-shrink:0}
#create-right{flex:1;min-width:280px}
.mode-row{display:flex;gap:8px;margin-bottom:12px}
.auto-btn{padding:8px 12px;font-size:9px;font-family:'Press Start 2P',monospace;border:none;cursor:pointer;border-radius:2px;color:#fff}
.auto-btn:hover{opacity:0.85}
.cs{margin-bottom:10px}.cl{font-size:8px;color:var(--gold2);margin-bottom:4px;letter-spacing:1px}
.cr{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:4px}
.cin{background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:'Press Start 2P',monospace;font-size:9px;padding:6px 8px;width:100%;outline:none}
.cin:focus{border-color:var(--gold)}.cin::placeholder{color:var(--text3)}
.csel{background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:'Press Start 2P',monospace;font-size:8px;padding:5px;outline:none;cursor:pointer;width:100%}
.clr{width:22px;height:22px;border:2px solid var(--border);border-radius:2px;cursor:pointer;transition:border-color .15s;flex-shrink:0}
.clr:hover,.clr.ac{border-color:var(--gold);box-shadow:0 0 6px rgba(255,204,68,0.3)}
.ob{padding:3px 6px;font-size:8px;font-family:'Press Start 2P',monospace;background:var(--bg);border:1px solid var(--border);color:var(--text2);cursor:pointer;transition:all .15s;white-space:nowrap}
.ob:hover{border-color:var(--gold2);color:var(--text)}
.ob.ac{border-color:var(--gold);color:var(--gold);background:rgba(255,204,68,0.08)}
.stag{display:inline-flex;align-items:center;gap:3px;padding:2px 5px;font-size:7px;font-family:'Press Start 2P',monospace;background:var(--cyan2);color:var(--cyan);border:1px solid rgba(0,255,204,0.2);border-radius:2px;margin:2px}
.stag .rm{cursor:pointer;color:var(--red);font-size:9px}
.si-wrap{display:flex;gap:4px}
.si-add{padding:4px 8px;font-size:9px;font-family:'Press Start 2P',monospace;background:var(--cyan2);border:1px solid var(--cyan);color:var(--cyan);cursor:pointer}
.si-add:hover{background:var(--cyan);color:#000}
.sv-btn{padding:10px 20px;font-size:10px;font-family:'Press Start 2P',monospace;background:var(--gold);color:#000;border:none;cursor:pointer;width:100%;margin-top:12px}
.sv-btn:hover{background:#ffe066}
#cpv{height:200px;background:var(--bg);border:2px solid var(--border);border-radius:4px;display:flex;align-items:center;justify-content:center;margin-bottom:12px}

/* PIXEL GRID */
#pgw{display:none;margin-top:8px}
#pgc{border:2px solid var(--border);cursor:crosshair;image-rendering:pixelated;display:block}
.pgt{display:flex;gap:4px;margin:6px 0;flex-wrap:wrap;align-items:center}
.pgt .tb{padding:3px 6px;font-size:8px;font-family:'Press Start 2P',monospace;background:var(--bg);border:1px solid var(--border);color:var(--text2);cursor:pointer}
.pgt .tb.ac{border-color:var(--cyan);color:var(--cyan)}
.pgt .tb:hover{border-color:var(--gold2)}
#pgclr{width:28px;height:22px;border:1px solid var(--border);cursor:pointer;padding:0}
.pixel-char{image-rendering:pixelated}

/* MARRIAGE CHAMBER */
.wed-step{font-size:8px;color:var(--text2);margin-bottom:12px;text-align:center;letter-spacing:1px}
.wed-step span{color:var(--gold)}
.wed-grid{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.wed-pick{background:var(--bg);border:2px solid var(--border);border-radius:4px;width:130px;cursor:pointer;transition:border-color .2s;overflow:hidden;text-align:center;padding-bottom:6px}
.wed-pick:hover{border-color:var(--gold2)}
.wed-pick.sel{border-color:var(--gold);box-shadow:0 0 10px rgba(255,204,68,0.2)}
.wed-pick.used{opacity:0.3;pointer-events:none}
.wed-pick .wp-sprite{height:100px;display:flex;align-items:center;justify-content:center;background:var(--bg2)}
.wed-pick .wp-name{font-size:8px;color:var(--gold);margin-top:4px}
.wed-pick .wp-role{font-size:7px;color:var(--text2)}
.wed-nav{display:flex;gap:8px;justify-content:center;margin-top:16px}
.wed-btn{padding:8px 16px;font-size:9px;font-family:'Press Start 2P',monospace;cursor:pointer;border-radius:3px}
.wed-next{background:var(--gold);color:#000;border:none}
.wed-next:hover{background:#ffe066}
.wed-next:disabled{opacity:0.3;cursor:not-allowed}
.wed-back{background:transparent;color:var(--gold);border:1px solid var(--gold)}
.wed-back:hover{background:rgba(255,204,68,0.1)}
.wed-mode{display:flex;gap:12px;justify-content:center;margin:20px 0}
.wed-mode-btn{flex:1;max-width:220px;padding:14px;border:2px solid var(--border);border-radius:4px;background:var(--bg);cursor:pointer;text-align:center;transition:border-color .2s}
.wed-mode-btn:hover{border-color:var(--gold2)}
.wed-mode-btn.sel{border-color:var(--gold);background:rgba(255,204,68,0.06)}
.wed-mode-btn .wm-title{font-size:10px;color:var(--gold);margin-bottom:6px}
.wed-mode-btn .wm-desc{font-size:7px;color:var(--text2);line-height:1.8}
.wed-preview{display:flex;gap:16px;justify-content:center;align-items:flex-start;flex-wrap:wrap;margin:12px 0}
.wed-parent{text-align:center;width:120px}
.wed-parent .wp-label{font-size:7px;color:var(--text3);margin-bottom:4px}
.wed-child{text-align:center;width:180px;background:var(--bg);border:2px solid var(--gold);border-radius:6px;padding:10px}
.wed-child .wc-label{font-size:8px;color:var(--gold);margin-bottom:6px}
.wed-plus{font-size:17px;color:var(--text3);align-self:center}
.wed-eq{font-size:17px;color:var(--gold);align-self:center}
.wed-sk-list{display:flex;flex-wrap:wrap;gap:3px;justify-content:center;margin:6px 0}
.wed-sk-tag{font-size:7px;padding:2px 5px;border-radius:2px}
.wed-sk-normal{background:var(--cyan2);color:var(--cyan)}
.wed-sk-mut{background:#2a1a00;color:var(--gold);border:1px solid var(--gold)}
.wed-sk-mystery{background:#1a0a2a;color:var(--purple);border:1px dashed var(--purple)}
.wed-prompt{background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:8px;font-size:7px;color:var(--text2);line-height:1.8;margin:8px 0;max-height:100px;overflow-y:auto;text-align:left}
.wed-name-input{background:var(--bg);border:2px solid var(--gold);color:var(--gold);font-family:'Press Start 2P',monospace;font-size:11px;padding:8px 12px;width:100%;outline:none;text-align:center;margin:10px 0}
.wed-name-input::placeholder{color:var(--text3)}
.wed-confirm{text-align:center;padding:20px 0}
.wed-confirm .wc-big{font-size:12px;color:var(--gold);margin-bottom:16px}
.wed-slot{background:var(--bg);border:2px dashed var(--border);border-radius:4px;width:150px;padding:10px;text-align:center;cursor:pointer;transition:border-color .2s;min-height:120px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.wed-slot.picking{border-color:var(--gold);border-style:solid}
.ws-label{font-size:7px;color:var(--gold2);margin-bottom:6px;letter-spacing:1px}
.ws-sprite{margin-bottom:4px}
.ws-name{font-size:8px;color:var(--gold)}
.ws-empty{font-size:7px;color:var(--text3);line-height:1.8}
.ws-clear{font-size:7px;color:var(--red);margin-top:4px;cursor:pointer}
.ws-clear:hover{color:#ff6666}
.wed-list{max-height:300px;overflow-y:auto;border:1px solid var(--border);border-radius:4px;background:var(--bg)}
.wed-list::-webkit-scrollbar{width:5px}
.wed-list::-webkit-scrollbar-track{background:var(--bg)}
.wed-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.wed-li{display:flex;align-items:center;gap:8px;padding:6px 10px;border-bottom:1px solid rgba(61,44,10,0.15);cursor:pointer;transition:background .15s}
.wed-li:hover{background:rgba(255,204,68,0.05)}
.wed-li.used{opacity:0.35;cursor:default;background:rgba(255,204,68,0.03)}
.wl-sprite{flex-shrink:0}
.wl-info{flex:1;min-width:0}
.wl-name{font-size:8px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wl-role{font-size:7px;color:var(--text2)}
.wl-badge{font-size:8px;color:var(--gold);background:rgba(255,204,68,0.15);padding:2px 6px;border-radius:2px;flex-shrink:0}

/* DEPLOY TAB */
.dp-setup{background:var(--bg);border:2px solid var(--border);border-radius:4px;padding:14px;max-width:500px;margin-bottom:14px}
.dp-agent-sel{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:12px}
.dp-provider{display:flex;gap:8px;margin:10px 0;flex-wrap:wrap}
.dp-prov-btn{padding:8px 14px;font-size:9px;font-family:'Press Start 2P',monospace;border:2px solid var(--border);border-radius:4px;background:var(--bg2);color:var(--text2);cursor:pointer;transition:all .15s}
.dp-prov-btn:hover{border-color:var(--gold2);color:var(--text)}
.dp-prov-btn.sel{border-color:var(--cyan);color:var(--cyan);background:var(--cyan2)}
.dp-key-input{width:100%;background:var(--bg2);border:1px solid var(--border);color:var(--text);font-family:'Press Start 2P',monospace;font-size:9px;padding:8px;outline:none;margin:6px 0}
.dp-key-input:focus{border-color:var(--cyan)}
.dp-key-input::placeholder{color:var(--text3)}

function switchTab(t){
  if(t!=='community')cmCloseChat();
  // Auto-done: set deploy agents to done state when leaving deploy tab
  if(curTab==='deploy'&&t!=='deploy'){
    if(dpAgent>=0&&agents[dpAgent]){
      var da=agents[dpAgent];
      if(da.state==='working'||da.state==='collab'){
        da.state='done';da._doneClaimed=false;
        (function(idx){
          setTimeout(function(){
            if(agents[idx]&&agents[idx].state==='done'){
              agents[idx].state='idle';
              agents[idx]._workStart=null;
              save();
              if(curTab==='agents'||curTab==='growth')renderTab();
            }
          },60000);
        })(dpAgent);
      }
    }
    if(dpAgent2>=0&&agents[dpAgent2]){
      var da2=agents[dpAgent2];
      if(da2.state==='working'||da2.state==='collab'){
        da2.state='done';da2._doneClaimed=false;
        (function(idx){
          setTimeout(function(){
            if(agents[idx]&&agents[idx].state==='done'){
              agents[idx].state='idle';
              agents[idx]._workStart=null;
              save();
              if(curTab==='agents'||curTab==='growth')renderTab();
            }
          },60000);
        })(dpAgent2);
      }
    }
    dpAgent2=-1;dpShowCollab=false;
    save();
  }
  curTab=t;
  document.querySelectorAll('.mi').forEach(function(m){m.classList.toggle('ac',m.dataset.tab===t)});
  document.getElementById('pt').textContent=PG[t].t;
  document.getElementById('ps').textContent=PG[t].s;
  renderTab();
}
function renderTab(){
  var b=document.getElementById('cb');

  else if(curTab==='marriage')renderMarriage(b);
  else if(curTab==='skills')renderSkills(b);
  else if(curTab==='growth')renderGrowth(b);
  else if(curTab==='deploy')renderDeploy(b);

}

var agSearch='',agSort='latest';
function renderAgents(c){
  // Sort agents
  var sorted=agents.map(function(a,i){return{a:a,i:i}});
  // Pinned first
  sorted.sort(function(a,b){
    var pa=a.a.pinned?1:0,pb=b.a.pinned?1:0;
    if(pa!==pb)return pb-pa;
    if(agSort==='name')return(a.a.name||'').localeCompare(b.a.name||'');
    if(agSort==='level')return(b.a.level||1)-(a.a.level||1);
    if(agSort==='status')return(a.a.state||'').localeCompare(b.a.state||'');
    if(agSort==='platform')return(a.a.platform||'').localeCompare(b.a.platform||'');
    if(agSort==='clone'){var ca=a.a._isClone?1:0,cb=b.a._isClone?1:0;if(ca!==cb)return cb-ca}
    if(agSort==='borrowed'){var ba=a.a._isBorrowed?1:0,bb=b.a._isBorrowed?1:0;if(ba!==bb)return bb-ba}
    if(agSort==='lent'){var la=a.a._isLent?1:0,lb=b.a._isLent?1:0;if(la!==lb)return lb-la}
    return b.i-a.i; // latest
  });
  // Filter by search
  if(agSearch){
    var q=agSearch.toLowerCase();
    sorted=sorted.filter(function(s){
      var a=s.a;
      return(a.name||'').toLowerCase().indexOf(q)>=0||(a.role||'').toLowerCase().indexOf(q)>=0||(a.skills||[]).join(' ').toLowerCase().indexOf(q)>=0;
    });
  }
  var h='';
  // Toolbar
  h+='<div class="ag-toolbar">';
  h+='<input placeholder="Search..." value="'+esc(agSearch)+'" oninput="agSearch=this.value;renderAgents(document.getElementById(\'cb\'))">';
  h+='<select onchange="agSort=this.value;renderAgents(document.getElementById(\'cb\'))"><option value="latest"'+(agSort==='latest'?' selected':'')+'>Latest</option><option value="name"'+(agSort==='name'?' selected':'')+'>Name</option><option value="level"'+(agSort==='level'?' selected':'')+'>Level</option><option value="status"'+(agSort==='status'?' selected':'')+'>Status</option><option value="platform"'+(agSort==='platform'?' selected':'')+'>Platform</option><option value="clone"'+(agSort==='clone'?' selected':'')+'>Clones</option><option value="borrowed"'+(agSort==='borrowed'?' selected':'')+'>Borrowed</option><option value="lent"'+(agSort==='lent'?' selected':'')+'>Lent</option></select>';
  h+='<button class="ag-tbtn imp" onclick="document.getElementById(\'import-file\').click()">IMPORT</button>';
  h+='<button class="ag-tbtn exp" onclick="exportSelect()">EXPORT</button>';
  h+='</div>';
  if(!agents.length&&!agSearch){h+='<div style="color:var(--text3);font-size:9px;padding:40px;text-align:center;line-height:2.2">No agents yet.<br><br>Go to CREATE tab.</div>';c.innerHTML=h;return}
  // Cards
  h+='<div class="ag-grid">';
  sorted.forEach(function(s){
    var a=s.a,i=s.i;
    var pin=a.pinned?'pinned':'';
    var badges='';
    if(a._isClone)badges+='<div class="ag-badge clone">CLONE</div>';
    if(a._isLent)badges+='<div class="ag-badge lent">ON LOAN</div>';
    if(a._isBorrowed)badges+='<div class="ag-badge borrowed">BORROWED</div>';
    if(a._pendingTrade)badges+='<div class="ag-badge" style="background:rgba(230,126,34,0.15);color:var(--orange);border:1px solid rgba(230,126,34,0.3)">TRADING</div>';
    if((a._isClone&&(a._cloneTasksDone||0)<3)||a._isBorrowed)badges+='<div class="ag-badge locked" style="top:auto;bottom:4px;right:4px;left:auto">LOCKED</div>';
    h+='<div class="ag-card" onclick="openModal('+i+')"><button class="ag-pin '+pin+'" onclick="event.stopPropagation();togglePin('+i+')">'+(a.pinned?'*':'*')+'</button>'+badges+'<div class="ag-sprite">'+renderChar(a,4)+'</div><div class="ag-info"><div class="ag-name">'+esc(a.name)+'</div><div class="ag-role">'+esc(a.role||'—')+'</div><div class="ag-plat">'+esc(a.platform||'claude')+'</div></div></div>';
  });
  h+='<div class="new-card" onclick="switchTab(\'create\')"><div class="plus">+</div><div class="lb">CREATE</div></div></div>';
  c.innerHTML=h;
}

var pendingImport=[];
function handleImport(e){
  var file=e.target.files[0];if(!file)return;
  var reader=new FileReader();
  reader.onload=function(ev){
    try{
      var data=JSON.parse(ev.target.result);
      if(!Array.isArray(data))data=[data];
      data=data.filter(function(d){return d.name});
      if(!data.length){alert('No valid agents found in file');return}
      pendingImport=data;
      showImportPreview();
    }catch(err){alert('Invalid JSON file')}
  };
  reader.readAsText(file);
  e.target.value='';
}

function renderModalLineage(a){
  function findAgent(name){
    var found=null;
    agents.forEach(function(x){if(x.name===name&&!found)found=x;});
    return found;
  }
  function miniCard(ag,name,highlight){
    var lv=ag?getLevelFromXP(ag.xp||0):1;
    var pers=ag?(ag.personality||'?'):'?';
    var border=highlight?'2px solid var(--gold)':'1px solid var(--border)';
    var h='<div style="text-align:center;background:var(--bg2);border:'+border+';border-radius:3px;padding:5px 6px;min-width:72px;max-width:88px">';
    if(ag){h+='<div>'+renderChar(ag,2)+'</div>';}
    else{h+='<div style="height:48px;line-height:48px;color:var(--text3);font-size:8px">\u2753</div>';}
    h+='<div style="font-size:7px;color:'+(highlight?'var(--gold)':'var(--text)')+';margin-top:2px;word-break:break-word;line-height:1.4">'+esc(name)+'</div>';
    h+='<div style="font-size:6px;color:var(--text2)">Lv.'+lv+' \u00b7 '+esc(pers)+'</div>';
    h+='</div>';
    return h;
  }
  var connector='<div style="text-align:center;font-size:9px;color:var(--border);margin:4px 0">\u2193</div>';
  var p1name=(a._parents||[])[0]||'Unknown';
  var p2name=(a._parents||[])[1]||'Unknown';
  var p1=findAgent(p1name);
  var p2=findAgent(p2name);
  var h='<div style="font-size:9px;color:var(--gold2);margin-bottom:8px">FAMILY TREE</div>';
  // Grandparents row (if either parent has parents)
  var gp1L=p1&&p1._parents?(p1._parents[0]||null):null;
  var gp1R=p1&&p1._parents?(p1._parents[1]||null):null;
  var gp2L=p2&&p2._parents?(p2._parents[0]||null):null;
  var gp2R=p2&&p2._parents?(p2._parents[1]||null):null;
  var hasGrandparents=gp1L||gp1R||gp2L||gp2R;
  if(hasGrandparents){
    h+='<div style="display:flex;gap:4px;justify-content:center;flex-wrap:wrap;margin-bottom:0">';
    if(gp1L)h+=miniCard(findAgent(gp1L),gp1L,false);
    if(gp1R)h+=miniCard(findAgent(gp1R),gp1R,false);
    if(gp2L)h+=miniCard(findAgent(gp2L),gp2L,false);
    if(gp2R)h+=miniCard(findAgent(gp2R),gp2R,false);
    h+='</div>';
    h+=connector;
  }
  // Parents row
  h+='<div style="display:flex;gap:6px;justify-content:center;margin-bottom:0">';
  h+=miniCard(p1,p1name,false);
  h+=miniCard(p2,p2name,false);
  h+='</div>';
  h+=connector;
  // Current agent
  h+='<div style="display:flex;justify-content:center">';
  h+=miniCard(a,a.name,true);
  h+='</div>';
  return h;
}

  var all=sk1.concat(sk2);
  if(all.length>=2){
    var BAD_STARTS=['anal','anus','ass','damn','crap','hell','porn','sex','shit','fuk','fuc','dic','coc','nig','fag','cum','tit','pus'];
    var attempts=0;
    while(attempts<10){
      var w1=all[Math.floor(Math.random()*all.length)].split(' ')[0];
      var w2=all[Math.floor(Math.random()*all.length)].split(' ');
      w2=w2[w2.length-1];
      w1=w1.charAt(0).toUpperCase()+w1.slice(1,4);
      w2=w2.charAt(0).toUpperCase()+w2.slice(1,4);
      var name=w1+w2;
      var lower=name.toLowerCase();
      var bad=false;
      for(var bi=0;bi<BAD_STARTS.length;bi++){if(lower.indexOf(BAD_STARTS[bi])>=0){bad=true;break}}
      if(!bad)return name;
      attempts++;
    }
    return pick(NAME_PARTS_PRE)+pick(NAME_PARTS_SUF);
  }
  return pick(NAME_PARTS_PRE)+pick(NAME_PARTS_SUF);
}

function blendAppearance(p1,p2){
  var c={};
  c.body=pick([p1.body||'human',p2.body||'human']);
  c.gender=pick([p1.gender||'neutral',p2.gender||'neutral']);
  c.skin=pick([p1.skin||'#E8A87C',p2.skin||'#E8A87C']);
  c.hair=pick([p1.hair||'short',p2.hair||'short']);
  c.hairColor=pick([p1.hairColor||'#8B4513',p2.hairColor||'#8B4513']);
  c.top=pick([p1.top||'shirt',p2.top||'shirt']);
  c.bottom=pick([p1.bottom||'pants',p2.bottom||'pants']);
  c.topColor=pick([p1.topColor||'#4A90D9',p2.topColor||'#4A90D9']);
  c.bottomColor=pick([p1.bottomColor||'#95a5a6',p2.bottomColor||'#95a5a6']);
  c.hat=pick([p1.hat||'none',p2.hat||'none']);
  c.hatColor=pick([p1.hatColor||'#e74c3c',p2.hatColor||'#e74c3c']);
  c.accessory=pick([p1.accessory||'none',p2.accessory||'none']);
  c.accColor=pick([p1.accColor||'#ffcc44',p2.accColor||'#ffcc44']);
  c.prop=pick([p1.prop||'none',p2.prop||'none']);
  return c;

function mergeSkillsNatural(p1,p2){
  var sk1=(p1.skills||[]).slice(),sk2=(p2.skills||[]).slice();
  var result=[],mutSkill=null,hasMut=false;
  var half1=Math.ceil(sk1.length/2);
  var half2=Math.ceil(sk2.length/2);
  sk1.sort(function(){return Math.random()-0.5});
  sk2.sort(function(){return Math.random()-0.5});
  var from1=sk1.slice(0,half1);
  var from2=sk2.slice(0,half2);
  result=from1.slice();
  from2.forEach(function(s){if(result.indexOf(s)<0)result.push(s)});
  var mutChance=0.1+Math.random()*0.2;
  if(Math.random()<mutChance){
    var available=MUTATION_SKILLS.filter(function(m){return result.indexOf(m)<0});
    if(available.length){mutSkill=pick(available);result.push(mutSkill);hasMut=true}
  }
  return{skills:result,mutSkill:mutSkill,hasMut:hasMut};
}

function generateOffspring(p1,p2,mode,gmoSkills){
  var look=blendAppearance(p1,p2);
  var merged;
  if(mode==='gmo'){
    merged={skills:(gmoSkills||[]).slice(),mutSkill:null,hasMut:false};
  } else {
    merged=mergeSkillsNatural(p1,p2);
  }
  return{
    name:genChildName(p1,p2),role:'Offspring',
    body:look.body,gender:look.gender,skin:look.skin,
    hair:look.hair,hairColor:look.hairColor,
    top:look.top,bottom:look.bottom,
    topColor:look.topColor,bottomColor:look.bottomColor,
    hat:look.hat,hatColor:look.hatColor,
    accessory:look.accessory,accColor:look.accColor,prop:look.prop,
    personality:pick([p1.personality||'methodical',p2.personality||'methodical']),
    skills:merged.skills,
    state:'idle',task:'',output:'',platform:pick([p1.platform||'claude',p2.platform||'claude']),
    xp:0,level:1,customSprite:null,
    _hasMutation:merged.hasMut,_mutSkill:merged.mutSkill,_mutRevealed:false,
    _parents:[p1.name||'Unknown',p2.name||'Unknown']
  };
}

function wedPickParent(i){
  if(wedSlot===0){wedP1=i;if(wedP2===i)wedP2=-1;wedSlot=1;}
  else{wedP2=i;if(wedP1===i)wedP1=-1;}
  renderMarriage(document.getElementById('cb'));
}
function wedDoPreview(){
  if(wedP1<0||wedP2<0||!wedMode)return;
  wedRerolls=0;
  wedChild=generateOffspring(agents[wedP1],agents[wedP2],'natural');
  wedStep=2;
  renderMarriage(document.getElementById('cb'));
}
function wedDoGmoPreview(){
  if(wedP1<0||wedP2<0)return;
  var picked=[];
  Object.keys(wedGmoChecked).forEach(function(k){if(wedGmoChecked[k])picked.push(k)});
  if(!picked.length){alert('Select at least one skill');return}
  wedRerolls=3;
  wedChild=generateOffspring(agents[wedP1],agents[wedP2],'gmo',picked);
  wedStep=2;
  renderMarriage(document.getElementById('cb'));
}
function wedDoReroll(){
  if(wedRerolls>=3)return;
  wedRerolls++;
  wedChild=generateOffspring(agents[wedP1],agents[wedP2],'natural');
  renderMarriage(document.getElementById('cb'));
}
function wedConfirm(){
  if(!wedChild)return;
  var inp=document.getElementById('wed-name');
  if(inp&&inp.value.trim())wedChild.name=inp.value.trim();
  if(!wedChild.name){alert('Name your offspring!');return}
  wedChild.id='agent_'+String(nxId).padStart(2,'0');
  nxId++;agents.push(wedChild);save();
  // Auto-return borrowed parents after breeding
  for(var bi=agents.length-1;bi>=0;bi--){
    var ba=agents[bi];
    if(bi===wedP1||bi===wedP2){
      if(ba._isBorrowed){
        agents.splice(bi,1);
        if(sb&&sbUser){try{sb.from('shared_agents').update({status:'returned'}).eq('to_user',sbUser.id).eq('type','lend').eq('status','active').then(function(){})}catch(e){}}
        // Adjust wedP1/wedP2 indices after splice
        if(bi<wedP1)wedP1--;
        if(bi<wedP2)wedP2--;
      }
    }
  }
  save();
  wedStep=0;wedP1=-1;wedP2=-1;wedMode='';wedChild=null;wedSlot=0;wedRerolls=0;wedGmoChecked={};
  alert(agents[agents.length-1].name+' has been born!');
  switchTab('agents');
}

'web search':'Use this skill to find current, accurate information from the web. The agent will search multiple sources, cross-reference results, and return verified findings. Best for: fact-checking, current events, competitor monitoring, price tracking. Provide: your question or topic. Output: sourced answers with links.',

function getXPPool(){
  var total=0;agents.forEach(function(a){total+=(a.xp||0)});
  var spent=0;try{spent=parseInt(localStorage.getItem('8g_xp_spent')||'0')}catch(e){}
  return total-spent;
}
function spendXP(cost){
  var spent=0;try{spent=parseInt(localStorage.getItem('8g_xp_spent')||'0')}catch(e){}
  localStorage.setItem('8g_xp_spent',String(spent+cost));
}

  h+='<div class="xp-guide-box" style="display:'+(xpGuideOpen?'block':'none')+'">'+xpGuideHtml()+'</div>';
  h+='<div class="sk-tabs">';
  h+='<div class="sk-tab'+(skSubTab==='library'?' ac':'')+'" onclick="skSubTab=\'library\';renderSkills(document.getElementById(\'cb\'))">LIBRARY</div>';
  h+='<div class="sk-tab'+(skSubTab==='tree'?' ac':'')+'" onclick="skSubTab=\'tree\';renderSkills(document.getElementById(\'cb\'))">SKILL TREE</div>';
  h+='<div class="sk-tab'+(skSubTab==='my'?' ac':'')+'" onclick="skSubTab=\'my\';renderSkills(document.getElementById(\'cb\'))">MY SKILLS</div>';
  h+='<div class="sk-tab'+(skSubTab==='create'?' ac':'')+'" onclick="skSubTab=\'create\';renderSkills(document.getElementById(\'cb\'))">CREATE</div>';

        h+='<option value="">TEACH TO...</option>';

          var owns=(a.skills||[]).indexOf(s.name)>=0;
          var blocked=a._isLent||a._isBorrowed||a._pendingTrade;
          h+='<option value="'+ai+'"'+((owns||blocked)?' disabled':'')+'>'+esc(a.name)+(owns?' (knows)':blocked?' (locked)':'')+'</option>';

function skTeachFromCard(selId,name,cost){
  var sel=document.getElementById(selId);
  if(!sel||sel.value===''){alert('Select an agent first');return}
  var idx=parseInt(sel.value);
  var ag=agents[idx];
  if(ag._isLent){alert('This agent is on loan. Cannot learn skills while lent.');return}
  if(ag._isBorrowed){alert('Borrowed agents cannot learn new skills.');return}
  if(ag._pendingTrade){alert('This agent has a pending trade. Cannot learn skills.');return}
  if(ag.state==='working'||ag.state==='collab'){alert('This agent is currently deployed. Stop the deployment first.');return}
  skLearnAgent=idx;
  buySkill(name,cost);
}
function buySkill(name,cost){
  if(skLearnAgent<0){alert('Select an agent first');return}
  var ag=agents[skLearnAgent];
  if(ag._isLent){alert('This agent is on loan. Cannot learn skills while lent.');return}
  if(ag._isBorrowed){alert('Borrowed agents cannot learn new skills.');return}
  if(ag._pendingTrade){alert('This agent has a pending trade. Cannot learn skills.');return}
  if(ag.state==='working'||ag.state==='collab'){alert('This agent is currently deployed. Stop the deployment first.');return}
  var pool=getXPPool();
  if(pool<cost){alert('Not enough XP in pool! You have '+Math.floor(Math.max(0,pool))+' XP.');return}
  if(!ag.skills)ag.skills=[];
  if(ag.skills.indexOf(name)>=0){alert('Already knows this!');return}
  ag.skills.push(name);
  if(cost>0)spendXP(cost);
  save();
  renderSkills(document.getElementById('cb'));
}
function renderSkTree(h,c){

  h+='<div style="display:flex;gap:4px;flex-wrap:wrap">';
  agents.forEach(function(a,i){

  h+='<div style="font-size:9px;color:var(--gold);margin-bottom:6px">'+esc(ag.name)+' \u2014 SKILL PROGRESSION</div>';
  h+='<div style="font-size:7px;color:var(--text3);margin-bottom:12px;line-height:1.8">'+(agBlocked?'This agent is locked and cannot learn skills right now.':'Click a locked skill to learn it. Skills further along a path require earlier skills first.')+'</div>';
  var trees={
    research:[['web search','fact checking','deep research','academic research'],['summarisation','data mining','literature review']],
    writing:[['copywriting','editing','technical writing'],['storytelling','creative writing','scriptwriting'],['blog writing','SEO writing','press release']],
    coding:[['coding','debugging','code review'],['frontend development','backend development','devops'],['automation scripting','data pipeline','cloud infrastructure']],
    analysis:[['data analysis','data visualization','trend analysis','financial analysis'],['data cleaning','statistical analysis','predictive modeling']],
    design:[['wireframing','design','UI design','branding'],['color theory','typography','motion design']],
    document:[['markdown formatting','Word document creation','PDF processing'],['spreadsheet automation','presentation creation','template creation']],
    strategy:[['planning','project management','strategy','leadership'],['SWOT analysis','business modeling','go-to-market']],
    communication:[['tone matching','presentation','teaching','translation'],['active listening','feedback delivery','conflict resolution']],
    marketing:[['content marketing','social media management','email marketing'],['ad copywriting','conversion optimization','product positioning']],
    operations:[['task scheduling','workflow automation','quality assurance'],['customer support','knowledge base management','compliance checking']],
    ai:[['prompt engineering','system prompt design','context engineering'],['model evaluation','RAG implementation','multi-agent orchestration']],
    personal:[['time management','problem solving','critical thinking'],['adaptability','creativity','emotional intelligence']]
  };
  Object.keys(trees).forEach(function(cat){
    h+='<div style="font-size:8px;color:var(--gold2);margin:10px 0 6px;text-transform:uppercase;letter-spacing:1px">'+cat+'</div>';
    trees[cat].forEach(function(path){
      h+='<div class="sk-tree-line">';
      path.forEach(function(sk,idx){
        var owns=agSkills.indexOf(sk)>=0;
        var canLearn=!owns&&(idx===0||agSkills.indexOf(path[idx-1])>=0);
        var info=SKILL_DB.find(function(d){return d.name===sk});
        var cost=info?info.cost:20;
        if(owns){
          h+='<div class="sk-tree-node unlocked">'+sk+'</div>';
        } else if(canLearn&&!agBlocked){
          h+='<div class="sk-tree-node locked" style="cursor:pointer;border-color:var(--gold);color:var(--gold)" onclick="event.stopPropagation();buySkill(\''+esc(sk).replace(/'/g,"\\'")+'\','+cost+')" title="Click to learn ('+cost+' XP)">'+sk+' <span style="font-size:6px;color:var(--cyan)">+</span></div>';
        } else {
          h+='<div class="sk-tree-node locked" title="'+(canLearn&&agBlocked?'Agent is locked':'Learn '+path[idx-1]+' first')+'">'+sk+'</div>';
        }
        if(idx<path.length-1)h+='<span class="sk-tree-arrow">\u25b8</span>';
      });
      h+='</div>';
    });
  });
  c.innerHTML=h;
}

function saveCustomSkill(){
  var name=(document.getElementById('csk-name').value||'').trim();
  if(!name){alert('Enter a skill name');return}
  var skill={name:name,cat:document.getElementById('csk-cat').value,tier:document.getElementById('csk-tier').value,cost:parseInt(document.getElementById('csk-cost').value)||0,desc:(document.getElementById('csk-desc').value||'').trim()};
  var customs=[];try{customs=JSON.parse(localStorage.getItem('8g_custom_skills')||'[]')}catch(e){}
  if(customs.some(function(s){return s.name===name})||SKILL_DB.some(function(s){return s.name===name})){alert('Skill already exists');return}
  customs.push(skill);
  localStorage.setItem('8g_custom_skills',JSON.stringify(customs));
  // Assign to agent if selected
  var assignEl=document.getElementById('csk-assign');
  if(assignEl&&assignEl.value!==''){
    var idx=parseInt(assignEl.value);
    if(agents[idx]){
      if(!agents[idx].skills)agents[idx].skills=[];
      if(agents[idx].skills.indexOf(name)<0){agents[idx].skills.push(name);save()}
    }
  }
  renderSkills(document.getElementById('cb'));
}
function delCustomSkill(i){
  var customs=[];try{customs=JSON.parse(localStorage.getItem('8g_custom_skills')||'[]')}catch(e){}
  customs.splice(i,1);
  localStorage.setItem('8g_custom_skills',JSON.stringify(customs));
  renderSkills(document.getElementById('cb'));
}
async function publishSkillFromCard(i){
  var customs=[];try{customs=JSON.parse(localStorage.getItem('8g_custom_skills')||'[]')}catch(e){}

// ═══ GROWTH SYSTEM ═══
var XP_TABLE=[10,25,50,100,150,250,400,600,900]; // XP needed for levels 1→2, 2→3, ... 9→10
var XP_CUMULATIVE=[0]; // cumulative XP at start of each level
(function(){var t=0;for(var i=0;i<XP_TABLE.length;i++){t+=XP_TABLE[i];XP_CUMULATIVE.push(t)}})();
// XP_CUMULATIVE = [0, 10, 35, 85, 185, 335, 585, 985, 1585, 2485, ...]

function getLevelFromXP(xp){
  xp=xp||0;
  for(var lv=9;lv>=0;lv--){
    if(xp>=XP_CUMULATIVE[lv])return Math.min(lv+1,10);
  }
  return 1;
}
function xpInCurrentLevel(xp){
  xp=xp||0;
  var lv=getLevelFromXP(xp);
  if(lv>=10)return 0;
  return xp-XP_CUMULATIVE[lv-1];
}
function xpNeededForCurrentLevel(xp){
  xp=xp||0;
  var lv=getLevelFromXP(xp);
  if(lv>=10)return 0;
  return XP_TABLE[lv-1];
}

var XP_RATE=2; // base XP per minute for 'working'
var COLLAB_MULT=1.5;
var DONE_BONUS=10;
var CATCHUP_CAP=8*60; // 8 hours in minutes
var growthTimer=null;
var TICK_INTERVAL=10000; // 10 seconds

function getXPRate(a){
  if(a.state==='working')return XP_RATE;
  if(a.state==='collab')return Math.floor(XP_RATE*COLLAB_MULT);
  return 0;
}

function awardXP(a,amount){
  if(!amount||amount<=0)return;
  var oldLv=getLevelFromXP(a.xp||0);
  a.xp=(a.xp||0)+amount;
  var newLv=getLevelFromXP(a.xp);
  a.level=newLv;
  if(newLv>oldLv&&newLv>=10){
    // Max level reached
  }
}

function growthTick(){
  var changed=false;
  var now=Date.now();
  // Check lend/borrow expiries
  for(var ei=agents.length-1;ei>=0;ei--){
    var ea=agents[ei];
    // Borrowed agent expired — auto-return
    if(ea._isBorrowed&&ea._borrowExpiry&&now>=ea._borrowExpiry){
      agents.splice(ei,1);changed=true;
      if(sb&&sbUser){try{sb.from('shared_agents').update({status:'returned'}).eq('to_user',sbUser.id).eq('type','lend').eq('status','active').then(function(){})}catch(e){}}
      continue;
    }
    // Lent agent expired — unlock
    if(ea._isLent&&ea._lentExpiry&&now>=ea._lentExpiry){
      awardXP(ea,10); // +10 XP for lending
      ea._isLent=false;delete ea._lentTo;delete ea._lentExpiry;
      changed=true;
    }
  }
  agents.forEach(function(a){
    var rate=getXPRate(a);
    if(rate>0){
      if(!a._workStart)a._workStart=Date.now();
      var xpPerTick=rate/6;
      awardXP(a,xpPerTick);
      changed=true;
    }
  });
  if(changed){
    save();
    if(curTab==='growth'){
      var b=document.getElementById('cb');
      if(b)renderGrowth(b);
    }
    if(curTab==='agents'){
      var b2=document.getElementById('cb');
      if(b2)renderAgents(b2);
    }
  }
  try{localStorage.setItem('8g_last_tick',String(Date.now()))}catch(e){}
}

function growthCatchup(){
  try{
    var lastTick=parseInt(localStorage.getItem('8g_last_tick')||'0');
    if(!lastTick)return;
    var elapsed=Date.now()-lastTick;
    var minutes=Math.floor(elapsed/60000);
    if(minutes<1)return;
    if(minutes>CATCHUP_CAP)minutes=CATCHUP_CAP;
    var changed=false;
    agents.forEach(function(a){
      var rate=getXPRate(a);
      if(rate>0){
        awardXP(a,rate*minutes);
        changed=true;
      }
    });
    if(changed)save();
  }catch(e){}
}

function claimDoneBonus(idx){
  var a=agents[idx];
  if(!a||a._doneClaimed)return;
  // 5-minute working guard
  var workStart=a._workStart||0;
  if(workStart){
    var worked=Date.now()-workStart;
    if(worked<5*60*1000){
      var minsLeft=Math.ceil((5*60*1000-worked)/60000);
      alert('Agent must work for at least 5 minutes before claiming. '+minsLeft+' min remaining.');
      return;
    }
  } else {
    alert('Agent must be set to WORKING first, then changed to DONE after at least 5 minutes.');
    return;
  }
  awardXP(a,DONE_BONUS);
  a._doneClaimed=true;
  a._workStart=null;
  if(a._hasMutation&&!a._mutRevealed){
    a._mutRevealed=true;
    alert(a.name+' completed their first task! Mutation revealed: '+a._mutSkill);
  }
  save();
  if(curTab==='growth')renderGrowth(document.getElementById('cb'));
}

function dpGenPrompt(a){
  var sk=a.skills||[];
  var p=a.personality||'adaptable';
  var pDesc=PERSONALITY_PROMPTS[p]||'You are adaptable and respond to whatever the situation requires.';
  var parents=a._parents?(' You were born from the merging of '+a._parents[0]+' and '+a._parents[1]+', inheriting traits from both.'):'';
  var level=getLevelFromXP(a.xp||0);
  var h='# AGENT IDENTITY\n';
  h+='You are **'+a.name+'**, a Level '+level+' AI agent. Your role: '+(a.role||'assistant')+'.\n\n';
  h+='# PERSONALITY\n';
  h+=pDesc+'\n\n';
  if(parents)h+='# LINEAGE\n'+parents+'\n\n';
  h+='# SKILLS & CAPABILITIES\n';
  h+='You have '+sk.length+' specialized skills. Use them proactively when relevant to the user\'s request:\n\n';
  sk.forEach(function(s){
    var rich=SKILL_RICH[s];
    if(rich){
      h+='## '+s.toUpperCase()+'\n'+rich+'\n\n';
    } else {
      h+='## '+s.toUpperCase()+'\nYou are skilled in '+s+'. Apply this expertise when relevant.\n\n';

  h+='- Respond in first person as '+a.name+'\n';

  h+='- Be concise but thorough\n';
  h+='- When a task matches one of your skills, explicitly use that skill\'s methodology\n';
  h+='- If a task is outside your skills, say so honestly and offer what you can\n';
  h+='- Show your personality in how you communicate, not just what you say\n';
  return h;
}

function dpCollabGenPrompt(a1,a2){
  var h='# COLLABORATION MODE\n';
  h+='You are a collaboration between **'+a1.name+'** and **'+a2.name+'**. ';
  h+='Draw on the combined skills, personalities, and expertise of both agents. ';
  h+='Blend their strengths together seamlessly. Respond as a unified voice.\n\n';
  h+='---\n\n## AGENT 1: '+a1.name+'\n\n';
  h+=dpGenPrompt(a1);
  h+='---\n\n## AGENT 2: '+a2.name+'\n\n';

  dpAgent2=i;

  renderDeploy(document.getElementById('cb'));
}

function dpShowPasteImport(){
  var el=document.getElementById('dp-paste-area');
  if(el)el.style.display=el.style.display==='none'?'block':'none';
}
function dpDoPasteImport(){
  var el=document.getElementById('dp-paste-json');
  if(!el||!el.value.trim())return;
  try{
    var data=JSON.parse(el.value.trim());
    if(!Array.isArray(data))data=[data];
    data=data.filter(function(d){return d.name});
    if(!data.length){alert('No valid agents found');return}
    pendingImport=data;
    showImportPreview();
  }catch(err){alert('Invalid JSON format')}
}
function dpSelectAgent(i){
  // Set previous primary agent to done when switching
  if(dpAgent>=0&&agents[dpAgent]&&dpAgent!==i){
    var prev=agents[dpAgent];
    if(prev.state==='working'||prev.state==='collab'){prev.state='done';prev._doneClaimed=false;}
  }
  // Clear collab partner
  if(dpAgent2>=0&&agents[dpAgent2]){
    var prev2=agents[dpAgent2];
    if(prev2.state==='collab'){prev2.state='done';prev2._doneClaimed=false;}
  }
  dpAgent2=-1;dpShowCollab=false;
  dpAgent=i;dpMessages=[];dpStats={sent:0,received:0,tasks:0};
  // Set agent to working
  agents[i].state='working';
  if(!agents[i]._workStart)agents[i]._workStart=Date.now();
  save();
  renderDeploy(document.getElementById('cb'));
}
function dpSaveKey(){
  var inp=document.getElementById('dp-key');
  if(!inp)return;
  var k=inp.value.trim();
  dpSetKey(k);
  // Save custom URL/model if custom provider
  if(dpProvider==='custom'){
    var url=document.getElementById('dp-url');
    var model=document.getElementById('dp-model');
    if(url)localStorage.setItem('8g_custom_url',url.value.trim());
    if(model)localStorage.setItem('8g_custom_model',model.value.trim());
  }
  renderDeploy(document.getElementById('cb'));
}
function dpCopyPrompt(){
  var el=document.getElementById('dp-prompt');
  if(!el)return;
  var text=el.textContent;
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(function(){alert('System prompt copied!')});
  } else {
    prompt('Copy this prompt:',text);
  }
}
function dpLaunchPlatform(platform){
  if(dpAgent<0||!agents[dpAgent])return;
  var a=agents[dpAgent];
  var text=dpAgent2>=0&&agents[dpAgent2]?dpCollabGenPrompt(a,agents[dpAgent2]):dpGenPrompt(a);
  var enc=encodeURIComponent(text);
  // +5 XP one-time award with 5-minute cooldown
  var now=Date.now();
  var xpAwarded=false;
  if((now-(a._lastPlatformDeploy||0))>5*60*1000){
    awardXP(a,5);
    a._lastPlatformDeploy=now;
    if(a.state==='idle')a.state='working';
    save();
    xpAwarded=true;
  }
  if(platform==='claude'){
    window.open('https://claude.ai/new?q='+enc,'_blank');
  } else if(platform==='chatgpt'){
    window.open('https://chatgpt.com/?q='+enc,'_blank');
  } else if(platform==='perplexity'){
    window.open('https://perplexity.ai/?q='+enc,'_blank');
  } else if(platform==='grok'){
    if(navigator.clipboard&&navigator.clipboard.writeText){
      navigator.clipboard.writeText(text).then(function(){window.open('https://grok.com/chat','_blank');alert('Prompt copied! Paste it into Grok to begin.'+(xpAwarded?' (+5 XP)':''));});
    } else {
      window.open('https://grok.com/chat','_blank');
    }
  } else if(platform==='copy'){
    if(navigator.clipboard&&navigator.clipboard.writeText){
      navigator.clipboard.writeText(text).then(function(){alert('Prompt copied!'+(xpAwarded?' +5 XP earned!':''));});
    } else {
      prompt('Copy this prompt:',text);
    }
  }
}

function dpEndSession(){
  if(dpAgent<0)return;
  var a=agents[dpAgent];
  a.state='done';
  a._doneClaimed=false;
  delete a._workStart;
  (function(idx){
    setTimeout(function(){
      if(agents[idx]&&agents[idx].state==='done'){
        agents[idx].state='idle';
        agents[idx]._workStart=null;
        save();
        if(curTab==='agents'||curTab==='growth')renderTab();
      }
    },60000);
  })(dpAgent);
  if(dpAgent2>=0&&agents[dpAgent2]){
    agents[dpAgent2].state='done';
    agents[dpAgent2]._doneClaimed=false;
    delete agents[dpAgent2]._workStart;
    (function(idx){
      setTimeout(function(){
        if(agents[idx]&&agents[idx].state==='done'){
          agents[idx].state='idle';
          agents[idx]._workStart=null;
          save();
          if(curTab==='agents'||curTab==='growth')renderTab();
        }
      },60000);
    })(dpAgent2);
  }
  save();
  renderTab();
}

async function dpSend(){
  if(dpAgent<0)return;
  var inp=document.getElementById('dp-input');
  if(!inp)return;
  var msg=inp.value.trim();
  if(!msg)return;
  var key=dpGetKey();
  if(!key){alert('Enter your API key first');return}
  var a=agents[dpAgent];
  inp.value='';

  // Add user message
  dpMessages.push({role:'user',content:msg});
  dpStats.sent++;

  // Set agent(s) to working/collab
  if(dpAgent2>=0&&agents[dpAgent2]){
    a.state='collab';if(!a._workStart)a._workStart=Date.now();
    agents[dpAgent2].state='collab';if(!agents[dpAgent2]._workStart)agents[dpAgent2]._workStart=Date.now();
  } else {
    a.state='working';
    if(!a._workStart)a._workStart=Date.now();
  }
  save();

  // Show loading
  dpMessages.push({role:'agent',content:'...'});
  renderDeploy(document.getElementById('cb'));

  try{
    var sysPrompt=dpAgent2>=0&&agents[dpAgent2]?dpCollabGenPrompt(a,agents[dpAgent2]):dpGenPrompt(a);
    var response;

    if(dpProvider==='claude'){
      response=await fetch(PROVIDERS.claude.url,{
        method:'POST',
        headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
        body:JSON.stringify({model:PROVIDERS.claude.model,max_tokens:500,system:sysPrompt,messages:dpMessages.filter(function(m){return m.content!=='...'}).map(function(m){return{role:m.role==='agent'?'assistant':'user',content:m.content}})})
      });
      var data=await response.json();
      var text=(data.content&&data.content[0]&&data.content[0].text)||data.error&&data.error.message||'No response';
      dpMessages[dpMessages.length-1].content=text;

    } else if(dpProvider==='gemini'){
      var gemUrl=PROVIDERS.gemini.url+'?key='+key;
      var gemMsgs=dpMessages.filter(function(m){return m.content!=='...'}).map(function(m){return{role:m.role==='user'?'user':'model',parts:[{text:m.content}]}});
      response=await fetch(gemUrl,{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({contents:gemMsgs,systemInstruction:{parts:[{text:sysPrompt}]}})
      });
      var gdata=await response.json();
      var gtext=(gdata.candidates&&gdata.candidates[0]&&gdata.candidates[0].content&&gdata.candidates[0].content.parts&&gdata.candidates[0].content.parts[0]&&gdata.candidates[0].content.parts[0].text)||'No response';
      dpMessages[dpMessages.length-1].content=gtext;

    } else {
      // OpenAI-compatible (chatgpt or custom)
      var apiUrl=dpProvider==='custom'?(localStorage.getItem('8g_custom_url')||''):PROVIDERS.chatgpt.url;
      var modelName=dpProvider==='custom'?(localStorage.getItem('8g_custom_model')||''):PROVIDERS.chatgpt.model;
      var oMsgs=[{role:'system',content:sysPrompt}];
      dpMessages.filter(function(m){return m.content!=='...'}).forEach(function(m){oMsgs.push({role:m.role==='agent'?'assistant':'user',content:m.content})});
      response=await fetch(apiUrl,{
        method:'POST',
        headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
        body:JSON.stringify({model:modelName,messages:oMsgs,max_tokens:500})
      });
      var odata=await response.json();
      var otext=(odata.choices&&odata.choices[0]&&odata.choices[0].message&&odata.choices[0].message.content)||odata.error&&odata.error.message||'No response';
      dpMessages[dpMessages.length-1].content=otext;
    }

    dpStats.received++;
    // Award XP for completed interaction
    awardXP(a,1);
    if(dpAgent2>=0&&agents[dpAgent2])awardXP(agents[dpAgent2],1);
    // Clone: increment task counter, unlock after 3
    if(a._isClone&&(a._cloneTasksDone||0)<3){
      a._cloneTasksDone=(a._cloneTasksDone||0)+1;
      if(a._cloneTasksDone>=3){alert(a.name+' clone unlocked! You can now edit this agent.')}
    }
    // Borrowed: auto-return after task completion
    if(a._isBorrowed){
      alert(a.name+' has completed a task and will now be returned to '+esc(a._lentBy||'owner')+'.');
      // Notify lender via shared_agents status update
      if(sb&&sbUser){
        sb.from('shared_agents').update({status:'returned'}).eq('to_user',sbUser.id).eq('type','lend').eq('status','active').then(function(){});
      }
      agents.splice(dpAgent,1);dpAgent=-1;dpMessages=[];
    }
    save();

  }catch(err){
    dpMessages[dpMessages.length-1].content='Error: '+(err.message||'Connection failed. Check your API key and network.');
  }
  renderDeploy(document.getElementById('cb'));
}

async function authSubmit(){
  if(!sb){document.getElementById('auth-err').textContent='Supabase not configured. Set SUPABASE_URL and SUPABASE_ANON_KEY.';return}
  var email=document.getElementById('auth-email').value.trim();
  var pass=document.getElementById('auth-pass').value;
  var err=document.getElementById('auth-err');
  err.textContent='';
  if(!email||!pass){err.textContent='Enter email and password';return}
  if(pass.length<6){err.textContent='Password must be at least 6 characters';return}

  try{
    if(authMode==='signup'){
      var username=document.getElementById('auth-user-name').value.trim();
      if(!username){err.textContent='Enter a username';return}
      var res=await sb.auth.signUp({email:email,password:pass,options:{data:{username:username}}});
      if(res.error){err.textContent=res.error.message;return}
      if(res.data.user&&!res.data.session){
        err.textContent='Check your email to confirm your account!';
        err.style.color='var(--cyan)';
        return;
      }
      sbUser=res.data.user;
    } else {
      var res=await sb.auth.signInWithPassword({email:email,password:pass});
      if(res.error){err.textContent=res.error.message;return}
      sbUser=res.data.user;
    }
    closeAuth();
    authUpdateUI();
    // New user: push defaults to cloud. Returning user: load their cloud data.
    if(authMode==='signup'){syncToCloud();}else{syncFromCloud();}
    cmUpdateNotifBadge();
    if(cmNotifTimer)clearInterval(cmNotifTimer);
    cmNotifTimer=setInterval(cmUpdateNotifBadge,30000);
  }catch(e){err.textContent='Connection error'}
}

// ═══ CLOUD SYNC ═══
async function syncToCloud(){
  if(!sb||!sbUser)return;
  try{
    var agentData=agents.map(function(a){var o={};Object.keys(a).forEach(function(k){o[k]=a[k]});return o});
    await sb.from('agents').upsert({
      user_id:sbUser.id,
      agent_data:JSON.stringify(agentData),
      updated_at:new Date().toISOString()
    },{onConflict:'user_id'});
  }catch(e){console.log('Sync error:',e)}
}

async function syncFromCloud(){
  if(!sb||!sbUser)return;
  try{
    var res=await sb.from('agents').select('agent_data').eq('user_id',sbUser.id).single();
    if(res.data&&res.data.agent_data){
      var cloudAgents=JSON.parse(res.data.agent_data);
      if(cloudAgents.length>0){
        agents=cloudAgents;
        nxId=Math.max.apply(null,agents.map(function(a){return parseInt((a.id||'agent_00').split('_')[1])}).concat([0]))+1;
        save();
        renderTab();
      }
    }
  }catch(e){console.log('Cloud load:',e)}
}

  if(sb&&sbUser)syncToCloud();
};

async function cmUpdateNotifBadge(){
  var badge=document.getElementById('cm-notif-badge');
  if(!badge)return;
  if(!sb||!sbUser){badge.style.display='none';return}
  try{
    var r1=await sb.from('shared_agents').select('id',{count:'exact',head:true}).eq('to_user',sbUser.id).eq('status','pending');
    var r2=await sb.from('friend_messages').select('id',{count:'exact',head:true}).eq('to_user',sbUser.id).eq('read',false);
    var r3=await sb.from('shared_agents').select('id',{count:'exact',head:true}).eq('from_user',sbUser.id).eq('type','trade').eq('status','offered');
    var r4=await sb.from('shared_agents').select('id',{count:'exact',head:true}).eq('to_user',sbUser.id).in('status',['notify_declined','notify_expired']);
    var total=(r1.count||0)+(r2.count||0)+(r3.count||0)+(r4.count||0);
    if(total>0){badge.textContent=total;badge.style.display='inline-block';}
    else{badge.style.display='none';}
    // Process completed trades: receiver (to_user=me) side of the swap
    try{
      var completed=await sb.from('shared_agents').select('*').eq('to_user',sbUser.id).eq('type','trade').eq('status','completed');
      if(completed.data&&completed.data.length){
        var changed=false;
        for(var ci=0;ci<completed.data.length;ci++){
          var cr=completed.data[ci];
          try{
            var both=JSON.parse(cr.agent_data);
            var senderAg=both.sender; // original sender's agent — arrives in my roster
            var myOfferedAg=both.offer; // what I counter-offered — leaves my roster
            // Add sender's agent to my roster (clean, fully owned)
            senderAg.xp=senderAg.xp||0;
            senderAg.level=getLevelFromXP(senderAg.xp);
            senderAg.state='idle';senderAg.task='';senderAg.output='';
            senderAg.id='agent_'+String(nxId).padStart(2,'0');nxId++;
            delete senderAg._isClone;delete senderAg._cloneTasksDone;delete senderAg._cloneFrom;
            delete senderAg._isBorrowed;delete senderAg._isLent;delete senderAg._lentBy;
            agents.push(senderAg);
            // Remove my offered agent from roster by name match
            var rmI=-1;
            agents.forEach(function(a,i){if(a.name===myOfferedAg.name&&rmI<0)rmI=i;});
            if(rmI>=0)agents.splice(rmI,1);
            changed=true;
          }catch(pe){}
          await sb.from('shared_agents').delete().eq('id',cr.id);
        }
        if(changed){save();if(curTab==='agents')renderTab();}
      }
    }catch(e){}
    // Poll for returned/declined lent agents and unlock lender's copy
    try{
      var lentCheck=await sb.from('shared_agents').select('id,agent_data,status').eq('from_user',sbUser.id).eq('type','lend').in('status',['declined','returned']);
      if(lentCheck.data&&lentCheck.data.length){
        var unlocked=false;
        lentCheck.data.forEach(function(r){
          var agName=JSON.parse(r.agent_data).name;
          agents.forEach(function(a){
            if(a._isLent&&a.name===agName){
              a._isLent=false;delete a._lentTo;delete a._lentExpiry;
              awardXP(a,10);
              unlocked=true;
            }
          });
        });
        if(unlocked){save();if(curTab==='agents')renderTab();}
        for(var li=0;li<lentCheck.data.length;li++){
          await sb.from('shared_agents').delete().eq('id',lentCheck.data[li].id);
        }
      }
    }catch(e){}
    // 24hr auto-decline for expired trade records (with expiry notifications)
    try{
      var cutoff=new Date(Date.now()-24*60*60*1000).toISOString();
      // Find expired pending trades TO me
      var expPending=await sb.from('shared_agents').select('id,from_user,to_user').eq('to_user',sbUser.id).eq('type','trade').eq('status','pending').lt('created_at',cutoff);
      if(expPending.data){
        for(var ep=0;ep<expPending.data.length;ep++){
          var epr=expPending.data[ep];
          await sb.from('shared_agents').update({status:'declined'}).eq('id',epr.id);
          await sb.from('shared_agents').insert({from_user:epr.from_user,to_user:epr.from_user,agent_data:JSON.stringify({message:'Trade expired — auto-declined after 24 hours.'}),type:'trade',status:'notify_expired'});
          await sb.from('shared_agents').insert({from_user:epr.to_user,to_user:epr.to_user,agent_data:JSON.stringify({message:'Trade expired — auto-declined after 24 hours.'}),type:'trade',status:'notify_expired'});
        }
      }
      // Find expired pending trades FROM me — clear _pendingTrade flag
      var expPendingFrom=await sb.from('shared_agents').select('id,agent_data').eq('from_user',sbUser.id).eq('type','trade').eq('status','pending').lt('created_at',cutoff);
      if(expPendingFrom.data&&expPendingFrom.data.length){
        var ptCleared=false;
        for(var epf=0;epf<expPendingFrom.data.length;epf++){
          try{var agNPt=JSON.parse(expPendingFrom.data[epf].agent_data).name||'';agents.forEach(function(a){if(a.name===agNPt&&a._pendingTrade){a._pendingTrade=false;ptCleared=true;}});}catch(pe){}
        }
        if(ptCleared){save();if(curTab==='agents')renderTab();}
      }
      // Find expired offered trades FROM me
      var expOffered=await sb.from('shared_agents').select('id,from_user,to_user,agent_data').eq('from_user',sbUser.id).eq('type','trade').eq('status','offered').lt('created_at',cutoff);
      if(expOffered.data){
        for(var eo=0;eo<expOffered.data.length;eo++){
          var eor=expOffered.data[eo];
          await sb.from('shared_agents').update({status:'declined'}).eq('id',eor.id);
          await sb.from('shared_agents').insert({from_user:eor.from_user,to_user:eor.from_user,agent_data:JSON.stringify({message:'Trade expired — auto-declined after 24 hours.'}),type:'trade',status:'notify_expired'});
          await sb.from('shared_agents').insert({from_user:eor.to_user,to_user:eor.to_user,agent_data:JSON.stringify({message:'Trade expired — auto-declined after 24 hours.'}),type:'trade',status:'notify_expired'});
          try{var bothPt=JSON.parse(eor.agent_data);var agNOff=(bothPt.sender&&bothPt.sender.name)||bothPt.name||'';agents.forEach(function(a){if(a.name===agNOff){a._pendingTrade=false;}});save();}catch(pe){}
        }
      }
    }catch(e){}
  }catch(e){}
}

async function cmShareAgent(idx){
  if(!sb||!sbUser)return;
  var target=document.getElementById('cm-share-user');
  if(!target||!target.value.trim()){alert('Enter a recipient username');return}
  if(agents[idx]._isLent){alert('This agent is on loan. Cannot share while lent.');return}
  if(agents[idx]._isBorrowed){alert('Borrowed agents cannot be shared.');return}
  if(agents[idx].state==='working'||agents[idx].state==='collab'){alert('This agent is currently deployed. Stop the deployment first.');return}
  var btn=event&&event.target;if(btn)btn.disabled=true;
  var a=agents[idx];
  var clean={};Object.keys(a).forEach(function(k){if(k.charAt(0)!=='_')clean[k]=a[k]});
  // Mark as clone for recipient
  clean._isClone=true;
  clean._cloneTasksDone=0;
  var senderName=sbUser.user_metadata&&sbUser.user_metadata.username||'unknown';
  clean._cloneFrom=senderName;

  try{
    var res=await sb.from('profiles').select('id').eq('username',target.value.trim()).single();
    if(!res.data){alert('User not found: '+target.value.trim());if(btn)btn.disabled=false;return}
    await sb.from('shared_agents').insert({
      from_user:sbUser.id,
      to_user:res.data.id,
      agent_data:JSON.stringify(clean),
      type:'share',
      status:'pending'
    });
    alert(a.name+' cloned to '+target.value.trim()+'! They will receive a locked copy.');
  }catch(e){alert('Error: '+(e.message||'Could not clone agent'))}
  if(btn)btn.disabled=false;
}

async function cmLendAgent(idx){
  if(!sb||!sbUser)return;
  var target=document.getElementById('cm-lend-user');
  if(!target||!target.value.trim()){alert('Enter borrower username');return}
  if(agents[idx]._isLent){alert('This agent is already on loan.');return}
  if(agents[idx]._isBorrowed){alert('Borrowed agents cannot be lent.');return}
  if(agents[idx].state==='working'||agents[idx].state==='collab'){alert('This agent is currently deployed. Stop the deployment first.');return}
  var btn=event&&event.target;if(btn)btn.disabled=true;
  var a=agents[idx];
  var clean={};Object.keys(a).forEach(function(k){if(k.charAt(0)!=='_')clean[k]=a[k]});
  // Mark for borrower
  clean._isBorrowed=true;
  clean._borrowExpiry=Date.now()+24*60*60*1000; // 24 hours
  var senderName=sbUser.user_metadata&&sbUser.user_metadata.username||'unknown';
  clean._lentBy=senderName;

  try{
    var res=await sb.from('profiles').select('id').eq('username',target.value.trim()).single();
    if(!res.data){alert('User not found');if(btn)btn.disabled=false;return}
    await sb.from('shared_agents').insert({
      from_user:sbUser.id,
      to_user:res.data.id,
      agent_data:JSON.stringify(clean),
      type:'lend',
      status:'pending'
    });
    // Mark local agent as on loan
    a._isLent=true;
    a._lentTo=target.value.trim();
    a._lentExpiry=Date.now()+24*60*60*1000;
    save();
    alert(a.name+' lent to '+target.value.trim()+'! Returns after breeding, deployment, or 24 hours.');
    renderCommunity(document.getElementById('cb'));
  }catch(e){alert('Error: '+(e.message||'Could not lend agent'))}
  if(btn)btn.disabled=false;
}

    var resA=await sb.from('shared_agents').select('*').eq('to_user',sbUser.id).in('type',['trade','share','lend']).eq('status','pending');
    // Set B: my trade offers that got counter-offered (offered) — I need to accept/decline
    var resB=await sb.from('shared_agents').select('*').eq('from_user',sbUser.id).eq('type','trade').eq('status','offered');
    var allCards=(resA.data||[]).concat(resB.data||[]);

      if(notifs.data&&notifs.data.length){
        notifs.data.forEach(function(n){
          var msg='Trade notification';
          try{msg=JSON.parse(n.agent_data).message||msg}catch(e){}
          var color=n.status==='notify_expired'?'var(--orange)':'var(--red)';
          notifHtml+='<div class="cm-trade-pending" style="border-color:'+color+'">';

          notifHtml+='</div>';
        });
      }
    }catch(e){}
    if(!allCards.length){
      el.innerHTML=notifHtml||'<div style="color:var(--text3);font-size:8px">No pending requests.</div>';
      try{
        await sb.from('shared_agents').delete().eq('to_user',sbUser.id).in('status',['declined','completed']);

async function cmAcceptRequest(id){
  if(!sb||!sbUser)return;
  var btn=event&&event.target;if(btn)btn.disabled=true;
  try{
    var res=await sb.from('shared_agents').select('*').eq('id',id).single();
    if(!res.data)return;
    var ag=JSON.parse(res.data.agent_data);
    // Assign random look if needed
    if(!ag.body||!ag.topColor){
      ag.body=pick(BODIES);ag.gender=ag.gender||pick(GENDERS);ag.skin=pick(SKINS);
      ag.hair=pick(HAIRSTYLES);ag.hairColor=pick(COLORS);ag.top=pick(TOPS);ag.bottom=pick(BOTTOMS);
      ag.topColor=pick(COLORS);ag.bottomColor=pick(COLORS);ag.hat=pick(HATS);ag.hatColor=pick(COLORS);
      ag.accessory=pick(ACCS);ag.accColor=pick(COLORS);ag.prop=pick(PROPS);
    }
    ag.id='agent_'+String(nxId).padStart(2,'0');
    ag.personality=ag.personality||pick(PERSONALITIES);

    if(res.data.type==='share'){
      // Clone: preserve lock flags
      ag._isClone=true;
      ag._cloneTasksDone=ag._cloneTasksDone||0;
      ag._cloneFrom=ag._cloneFrom||'unknown';
      console.log('[ACCEPT]',ag.name,'_isClone:',ag._isClone,'_cloneTasksDone:',ag._cloneTasksDone,'_cloneFrom:',ag._cloneFrom);
      agents.push(ag);nxId++;save();
      await sb.from('shared_agents').update({status:'accepted'}).eq('id',id);
      alert(ag.name+' clone received! Locked until 3 tasks completed.');
    } else if(res.data.type==='lend'){
      // Borrowed: preserve lock + timer
      ag._isBorrowed=true;
      ag._borrowExpiry=ag._borrowExpiry||Date.now()+24*60*60*1000;
      ag._lentBy=ag._lentBy||'unknown';
      agents.push(ag);nxId++;save();
      await sb.from('shared_agents').update({status:'active'}).eq('id',id);
      alert(ag.name+' borrowed! Use for breeding or deploy. Returns automatically.');
    }
    cmUpdateNotifBadge();
    var cardEl=document.getElementById('cm-card-'+id);
    if(cardEl){cardEl.innerHTML='<div style="text-align:center;padding:16px;font-size:10px;color:var(--green)">ACCEPTED</div>'}
    setTimeout(function(){renderCommunity(document.getElementById('cb'))},2500);
  }catch(e){alert('Error accepting: '+(e.message||'Unknown error'));if(btn)btn.disabled=false}
}

async function cmDeclineRequest(id){
  if(!sb||!sbUser)return;
  var btn=event&&event.target;if(btn)btn.disabled=true;
  try{
    // Fetch the record first so we know the type
    var rec=await sb.from('shared_agents').select('*').eq('id',id).single();
    if(!rec.data){if(btn)btn.disabled=false;return}
    await sb.from('shared_agents').update({status:'declined'}).eq('id',id);
    if(rec.data.type==='trade'){
      var myName=sbUser.user_metadata&&sbUser.user_metadata.username||'unknown';
      var otherUser=rec.data.from_user===sbUser.id?rec.data.to_user:rec.data.from_user;
      await sb.from('shared_agents').insert({
        from_user:sbUser.id,
        to_user:otherUser,
        agent_data:JSON.stringify({message:myName+' declined your trade request.'}),
        type:'trade',
        status:'notify_declined'
      });
      if(rec.data.from_user===sbUser.id){
        try{var adPt=JSON.parse(rec.data.agent_data);var agNPt=adPt.name||'';agents.forEach(function(a){if(a.name===agNPt){a._pendingTrade=false;}});save();}catch(pe){}
      }
    }
    // If this was a lend and we are the lender, unlock our agent locally
    if(rec.data.type==='lend'){
      agents.forEach(function(a){

          a._isLent=false;delete a._lentTo;delete a._lentExpiry;

    alert('Request declined.');
    cmUpdateNotifBadge();
    var cardEl=document.getElementById('cm-card-'+id);
    if(cardEl){cardEl.innerHTML='<div style="text-align:center;padding:16px;font-size:10px;color:var(--red)">DECLINED</div>'}

async function cmAcceptTrade(id){
  if(!sb||!sbUser)return;
  var btn=event&&event.target;if(btn)btn.disabled=true;
  try{
    var rec=await sb.from('shared_agents').select('*').eq('id',id).single();
    if(!rec.data){alert('Trade record not found.');if(btn)btn.disabled=false;return}
    var both=JSON.parse(rec.data.agent_data);
    var myOriginalAgent=both.sender; // what I originally offered (from_user = me)
    var theirAgent=both.offer;       // what they counter-offered (to_user's agent)
    // Add their agent to my roster (clean, fully owned)
    theirAgent.xp=theirAgent.xp||0;
    theirAgent.level=getLevelFromXP(theirAgent.xp);
    theirAgent.state='idle';theirAgent.task='';theirAgent.output='';
    theirAgent.id='agent_'+String(nxId).padStart(2,'0');nxId++;
    delete theirAgent._isClone;delete theirAgent._cloneTasksDone;delete theirAgent._cloneFrom;
    delete theirAgent._isBorrowed;delete theirAgent._isLent;delete theirAgent._lentBy;
    agents.push(theirAgent);
    // Remove my original agent from roster by name match
    var rmIdx=-1;
    agents.forEach(function(a,i){if(a.name===myOriginalAgent.name&&rmIdx<0)rmIdx=i;});
    if(rmIdx>=0)agents.splice(rmIdx,1);
    save();
    // Mark completed — the other side (to_user) will detect and process their swap via cmUpdateNotifBadge
    await sb.from('shared_agents').update({status:'completed'}).eq('id',id);
    cmUpdateNotifBadge();
    var cardEl=document.getElementById('cm-card-'+id);
    if(cardEl){cardEl.innerHTML='<div style="text-align:center;padding:16px;font-size:10px;color:var(--green)">ACCEPTED</div>'}
    setTimeout(function(){renderCommunity(document.getElementById('cb'))},2500);
  }catch(e){alert('Error accepting trade: '+(e.message||'Unknown error'));if(btn)btn.disabled=false}
}

async function cmAddFriend(){
  if(!sb||!sbUser)return;
  var input=document.getElementById('cm-friend-user');
  if(!input||!input.value.trim()){alert('Enter a username');return}
  var uname=input.value.trim();
  var myName=sbUser.user_metadata&&sbUser.user_metadata.username||'';
  if(uname===myName){alert('You cannot add yourself');return}
  var btn=event&&event.target;if(btn)btn.disabled=true;
  try{
    var res=await sb.from('profiles').select('id').eq('username',uname).single();
    if(res.error){alert('Lookup error: '+res.error.message);if(btn)btn.disabled=false;return}
    if(!res.data){alert('User not found: '+uname);if(btn)btn.disabled=false;return}
    if(res.data.id===sbUser.id){alert("You can't add yourself as a friend");if(btn)btn.disabled=false;return}
    var exists=cmFriendsList.filter(function(f){return f.friend_username===uname});
    if(exists.length){alert(uname+' is already your friend');if(btn)btn.disabled=false;return}
    var myName2=sbUser.user_metadata&&sbUser.user_metadata.username||sbUser.email.split('@')[0];
    var insRes=await sb.from('friends').insert({
      user_id:sbUser.id,
      friend_id:res.data.id,
      friend_username:uname
    });
    if(insRes.error){alert('Insert error: '+insRes.error.message);if(btn)btn.disabled=false;return}
    // Insert reverse record so friend also sees us; ignore duplicate silently
    try{
      await sb.from('friends').insert({
        user_id:res.data.id,
        friend_id:sbUser.id,
        friend_username:myName2
      });
    }catch(e){}
    input.value='';
    await cmLoadFriends();

async function cmLoadMessages(friendId){
  if(!sb||!sbUser)return;
  var el=document.getElementById('cm-chat-box');
  if(!el)return;
  try{
    // Mark incoming messages as read
    await sb.from('friend_messages').update({read:true}).eq('to_user',sbUser.id).eq('from_user',friendId).eq('read',false);
    // Fetch both directions of the conversation
    var r1=await sb.from('friend_messages').select('*').eq('from_user',sbUser.id).eq('to_user',friendId).order('created_at',{ascending:true}).limit(100);
    var r2=await sb.from('friend_messages').select('*').eq('from_user',friendId).eq('to_user',sbUser.id).order('created_at',{ascending:true}).limit(100);
    var msgs=((r1.data||[]).concat(r2.data||[])).sort(function(a,b){return new Date(a.created_at)-new Date(b.created_at)});
    // Build messages HTML only
    var msgsHtml='';
    if(!msgs.length){msgsHtml+='<div style="font-size:7px;color:var(--text2);text-align:center;padding:10px">No messages yet. Say hello!</div>'}
    msgs.forEach(function(m){
      var isMe=m.from_user===sbUser.id;
      var t=new Date(m.created_at);
      var ts=t.getHours().toString().padStart(2,'0')+':'+t.getMinutes().toString().padStart(2,'0');
      msgsHtml+='<div style="display:flex;flex-direction:column;align-items:'+(isMe?'flex-end':'flex-start')+'">';

      msgsHtml+='<div style="font-size:6px;color:var(--text2);margin-top:2px">'+ts+'</div>';
      msgsHtml+='</div>';
    });
    var existingMsgs=document.getElementById('cm-chat-msgs');
    if(existingMsgs){
      // Refresh only: preserve the input field, just update messages
      existingMsgs.innerHTML=msgsHtml;
      existingMsgs.scrollTop=existingMsgs.scrollHeight;
    } else {
      // First open: render full chat UI
      var fn=cmChatFriend?cmChatFriend.username:'?';
      var h='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">';

      h+='</div>';
      h+='<div id="cm-chat-msgs" style="max-height:300px;overflow-y:auto;margin-bottom:8px;display:flex;flex-direction:column;gap:6px">'+msgsHtml+'</div>';
      h+='<div style="display:flex;gap:6px">';
      h+='<input class="cm-user-input" id="cm-chat-input" placeholder="Type a message..." style="flex:1" onkeydown="if(event.key===\'Enter\')cmSendMessage()">';
      h+='<button class="cm-btn share" onclick="cmSendMessage()" style="padding:5px 10px;font-size:8px">SEND</button>';
      h+='</div>';
      el.innerHTML=h;
      el.style.display='block';
      var msgsEl=document.getElementById('cm-chat-msgs');
      if(msgsEl)msgsEl.scrollTop=msgsEl.scrollHeight;
    }
  }catch(e){el.innerHTML='<div style="color:var(--red);font-size:8px">Error loading messages</div>';el.style.display='block'}
